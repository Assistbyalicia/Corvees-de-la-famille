<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Carnet de quêtes – Vue adultes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    .section {
      background: #ffffff;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .small {
      font-size: 0.8rem;
      color: #666;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      border-bottom: 1px solid #eee;
      padding: 0.5rem;
      text-align: left;
    }
    th {
      background: #fafafa;
      font-weight: 600;
    }
    .list {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 0;
    }
    .list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
    }
    .list li:last-child {
      border-bottom: none;
    }
    button {
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
      border-radius: 0.25rem;
      border: 1px solid #ccc;
      background: #f9f9f9;
      cursor: pointer;
    }
    button:hover {
      background: #f0f0f0;
    }
    input[type="text"],
    input[type="number"],
    select {
      font-size: 0.85rem;
      border: 1px solid #ccc;
      border-radius: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="margin-bottom: 1rem;">
      <button onclick="window.location.href='index.html'">
        ← Retour à l’accueil
      </button>
    </div>

    <div class="section">
      <h1>Carnet de quêtes – Vue adultes</h1>
      <p class="small">
        Récap des enfants et tâches des adultes.
      </p>
    </div>

    <div class="section">
      <h2>Enfants – tableau de bord</h2>
      <table id="children-table">
        <thead>
          <tr>
            <th>Enfant</th>
            <th>Corvées faites</th>
            <th>Corvées totales</th>
            <th>Complétion</th>
            <th>Étoiles</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Tâches adultes</h2>
      <div id="adults-sections"></div>
    </div>

    <div class="section">
      <h3>Ajouter une corvée</h3>
      <p class="small">
        Crée une nouvelle corvée et assigne-la à une personne (enfant ou adulte).
      </p>
      <div style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem;">
        <input id="new-chore-label" type="text" placeholder="Nom de la corvée" style="flex:2; padding:0.25rem;" />
        <input id="new-chore-stars" type="number" min="1" max="10" value="1" style="width:80px; padding:0.25rem;" />
        <select id="new-chore-person" style="padding:0.25rem;"></select>
        <button id="add-chore-btn">Ajouter</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "corvees-famille-adults-v1";
    const API_CONFIG_URL = "https://n8n.srv1105523.hstgr.cloud/webhook/03ec9874-25e6-483b-8305-4f622e53a24a";

    const defaultData = {
      children: [],
      adults: [],
      chores: [],
      state: {}
    };

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { ...defaultData };
      try {
        const parsed = JSON.parse(raw);
        return { ...defaultData, ...parsed };
      } catch (e) {
        console.error("Erreur de parsing localStorage", e);
        return { ...defaultData };
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let data = null;

    function getTodayKey() {
      const d = new Date();
      return d.toISOString().slice(0, 10);
    }

    function getPersonDayState(personId) {
      const dayKey = getTodayKey();
      if (!data.state[personId]) {
        data.state[personId] = {};
      }
      if (!data.state[personId][dayKey]) {
        data.state[personId][dayKey] = {
          completedChores: [],
          stars: 0
        };
      }
      return data.state[personId][dayKey];
    }

    function renderChildrenTable() {
      const tbody = document.querySelector("#children-table tbody");
      if (!tbody) return;
      tbody.innerHTML = "";

      (data.children || []).forEach(child => {
        const state = getPersonDayState(child.id);

        const choresForChild = (data.chores || []).filter(chore => {
          if (!chore.assignedTo || chore.assignedTo.length === 0) return true;
          return chore.assignedTo.includes(child.id);
        });

        const total = choresForChild.length;
        const completed = state.completedChores.filter(id =>
          choresForChild.some(chore => chore.id === id)
        ).length;
        const ratio = total === 0 ? 0 : Math.round((completed / total) * 100);

        const tr = document.createElement("tr");

        const tdName = document.createElement("td");
        tdName.textContent = child.name;

        const tdDone = document.createElement("td");
        tdDone.textContent = completed;

        const tdTotal = document.createElement("td");
        tdTotal.textContent = total;

        const tdRatio = document.createElement("td");
        tdRatio.textContent = `${ratio}%`;

        const tdStars = document.createElement("td");
        tdStars.textContent = `${state.stars}⭐`;

        tr.appendChild(tdName);
        tr.appendChild(tdDone);
        tr.appendChild(tdTotal);
        tr.appendChild(tdRatio);
        tr.appendChild(tdStars);

        tbody.appendChild(tr);
      });

      if (!data.children || data.children.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 5;
        td.textContent = "Aucun enfant configuré.";
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }

    function renderAdultsSections() {
      const container = document.getElementById("adults-sections");
      if (!container) return;
      container.innerHTML = "";

      const adults = data.adults || [];

      adults.forEach(person => {
        const state = getPersonDayState(person.id);

        const choresForPerson = (data.chores || []).filter(chore => {
          if (chore.assignedTo && chore.assignedTo.length > 0) {
            return chore.assignedTo.includes(person.id);
          }
          // Si pas d'assignation explicite, on considère que c'est visible pour les adultes
          return true;
        });

        const totalChores = choresForPerson.length;
        const completedCount = state.completedChores.filter(id =>
          choresForPerson.some(chore => chore.id === id)
        ).length;

        const remaining = choresForPerson.filter(chore =>
          !state.completedChores.includes(chore.id)
        );

        const completionRatio =
          totalChores === 0 ? 0 : Math.round((completedCount / totalChores) * 100);

        const section = document.createElement("div");
        section.className = "section";

        const title = document.createElement("h3");
        title.textContent = person.name;

        const summary = document.createElement("p");
        summary.className = "small";
        summary.textContent =
          `${completedCount}/${totalChores} corvées faites ` +
          `(${completionRatio}%), ${state.stars}⭐.`;

        const list = document.createElement("ul");
        list.className = "list";

        remaining.forEach(chore => {
          const li = document.createElement("li");
          const left = document.createElement("span");
          left.textContent = `${chore.label} (+${chore.stars}⭐)`;
          const right = document.createElement("span");
          right.textContent = "À faire";
          li.appendChild(left);
          li.appendChild(right);
          list.appendChild(li);
        });

        if (remaining.length === 0) {
          const li = document.createElement("li");
          li.textContent =
            totalChores === 0
              ? "Aucune corvée attribuée pour aujourd’hui."
              : "Aucune corvée restante pour aujourd’hui.";
          list.appendChild(li);
        }

        section.appendChild(title);
        section.appendChild(summary);
        section.appendChild(list);
        container.appendChild(section);
      });

      if (adults.length === 0) {
        const section = document.createElement("div");
        section.className = "section";
        section.textContent = "Aucun adulte configuré.";
        container.appendChild(section);
      }
    }

    function setupAddChoreForm() {
      const selectPerson = document.getElementById("new-chore-person");
      const btnAdd = document.getElementById("add-chore-btn");
      const inputLabel = document.getElementById("new-chore-label");
      const inputStars = document.getElementById("new-chore-stars");

      if (!selectPerson || !btnAdd || !inputLabel || !inputStars) return;

      selectPerson.innerHTML = "";
      const allPeople = [...(data.children || []), ...(data.adults || [])];
      allPeople.forEach(person => {
        const opt = document.createElement("option");
        opt.value = person.id;
        opt.textContent = person.name;
        selectPerson.appendChild(opt);
      });

      btnAdd.addEventListener("click", () => {
        const label = inputLabel.value.trim();
        const stars = parseInt(inputStars.value, 10) || 1;
        const personId = selectPerson.value;

        if (!label) {
          alert("Merci de saisir un nom de corvée.");
          return;
        }

        const newId = `${personId}-${label.toLowerCase().replace(/\s+/g, "-")}`;

        (data.chores || (data.chores = [])).push({
          id: newId,
          label,
          stars,
          assignedTo: [personId]
        });

        saveData(data);
        renderChildrenTable();
        renderAdultsSections();

        inputLabel.value = "";
        inputStars.value = "1";
      });
    }
data = {
  children: [
    { id: "enfant-1", name: "Enfant 1" },
    { id: "enfant-2", name: "Enfant 2" }
  ],
  adults: [
    { id: "maman", name: "Maman" },
    { id: "papa", name: "Papa" }
  ],
  chores: [
    { id: "chore-1", label: "Ranger la chambre", stars: 2, assignedTo: ["enfant-1"] },
    { id: "chore-2", label: "Vaisselle", stars: 2, assignedTo: ["maman"] },
    { id: "chore-3", label: "Sortir les poubelles", stars: 1, assignedTo: ["papa"] }
  ],
  state: {
    "enfant-1": {
      [new Date().toISOString().slice(0, 10)]: {
        completedChores: ["chore-1"],
        stars: 2
      }
    },
    "maman": {
      [new Date().toISOString().slice(0, 10)]: {
        completedChores: [],
        stars: 0
      }
    },
    "papa": {
      [new Date().toISOString().slice(0, 10)]: {
        completedChores: [],
        stars: 0
      }
    }
  }
};

// Et on commente initApp() et son appel :
/*
async function initApp() {
  const local = loadData();
  ...
}
initApp();
*/

// Remplace par :
renderChildrenTable();
renderAdultsSections();
setupAddChoreForm();
    async function initApp() {
      const local = loadData();

      try {
        const res = await fetch(API_CONFIG_URL);
        if (!res.ok) throw new Error("API config non disponible");

        const payload = await res.json();
        const config = Array.isArray(payload) ? payload[0] : payload;

        data = {
          ...defaultData,
          ...local,
          children: config.children || local.children || defaultData.children,
          adults: config.adults || local.adults || defaultData.adults,
          chores: config.chores || local.chores || defaultData.chores
        };
      } catch (e) {
        console.warn("API non disponible, utilisation du localStorage/defaultData :", e);
        data = {
          ...defaultData,
          ...local
        };
      }

      renderChildrenTable();
      renderAdultsSections();
      setupAddChoreForm();
    }

    initApp();
  </script>
</body>
</html>
